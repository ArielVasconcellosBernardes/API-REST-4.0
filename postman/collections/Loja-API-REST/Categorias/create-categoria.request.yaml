$kind: http-request
name: Create Categoria
method: POST
url: '{{baseUrl}}/api/categorias'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
  - key: x-user-id
    value: '{{userId}}'
body:
  type: json
  content: |-
    {
      "nome": "Eletrônicos"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 201 - Categoria criada", () => pm.response.to.have.status(201));
      pm.test("Retorna dados da categoria", () => {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
        pm.expect(json.data).to.have.property("id");
        pm.expect(json.data).to.have.property("nome");
      });
      if (pm.response.code === 201) {
        const json = pm.response.json();
        pm.collectionVariables.set("categoriaId", json.data.id);
      }
