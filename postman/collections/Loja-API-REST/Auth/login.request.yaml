$kind: http-request
name: Login
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "test@example.com",
      "password": "123456"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 - Login bem-sucedido", () => pm.response.to.have.status(200));
      pm.test("Retorna token JWT", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("token");
        pm.expect(json.token).to.be.a("string");
      });
      pm.test("Retorna dados do usuário", () => {
        const json = pm.response.json();
        pm.expect(json.user).to.have.property("id");
        pm.expect(json.user).to.have.property("email");
      });
      if (pm.response.code === 200) {
        const json = pm.response.json();
        pm.collectionVariables.set("token", json.token);
        pm.collectionVariables.set("userId", json.user.id);
      }
