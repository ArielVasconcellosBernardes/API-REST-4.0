$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nome": "Test User",
      "email": "test@example.com",
      "password": "123456"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 201 - Criado com sucesso", () => pm.response.to.have.status(201));
      pm.test("Retorna token JWT", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("token");
        pm.expect(json.token).to.be.a("string");
      });
      pm.test("Retorna dados do usuário", () => {
        const json = pm.response.json();
        pm.expect(json).to.have.property("user");
      });
      if (pm.response.code === 201) {
        const json = pm.response.json();
        pm.collectionVariables.set("token", json.token);
        if (json.user && json.user.id) pm.collectionVariables.set("userId", json.user.id);
      }
