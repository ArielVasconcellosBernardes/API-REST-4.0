$kind: http-request
name: Delete Cliente
method: DELETE
url: '{{baseUrl}}/api/clientes/{{clienteId}}'
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: x-user-id
    value: '{{userId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 204 - Deletado com sucesso", () => pm.response.to.have.status(204));
