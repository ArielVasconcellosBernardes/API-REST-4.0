$kind: http-request
name: Update Pedido
method: PUT
url: '{{baseUrl}}/api/pedidos/{{pedidoId}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
  - key: x-user-id
    value: '{{userId}}'
body:
  type: json
  content: |-
    {
      "status": "enviado"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200 - Atualizado", () => pm.response.to.have.status(200));
      pm.test("Dados atualizados", () => {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
      });
