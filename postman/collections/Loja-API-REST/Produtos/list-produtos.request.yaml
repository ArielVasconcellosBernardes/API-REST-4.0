$kind: http-request
name: List Produtos
method: GET
url: '{{baseUrl}}/api/produtos'
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: x-user-id
    value: '{{userId}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status 200", () => pm.response.to.have.status(200));
      pm.test("Retorna lista de produtos", () => {
        const json = pm.response.json();
        pm.expect(json.success).to.be.true;
        pm.expect(json.data).to.be.an("array");
      });
      if (pm.response.code === 200) {
        const json = pm.response.json();
        if (json.data && json.data.length > 0) pm.collectionVariables.set("produtoId", json.data[0].id);
      }
